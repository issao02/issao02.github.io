<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner de Documento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root {
      --bg-dark: #0a0a0d;
      --bg-card: #14141a;
      --accent: #8b5cf6;
      --accent-hover: #a78bfa;
      --text: #e4e4e7;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --success: #22c55e;
      --scan: #06b6d4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(139, 92, 246, 0.12), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 640px;
      padding: 2rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 0.5rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .camera-area {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      max-height: 360px;
      background: var(--bg-dark);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #video.active {
      display: block;
    }

    .camera-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .camera-placeholder.hidden {
      display: none;
    }

    .camera-placeholder svg {
      width: 64px;
      height: 64px;
      opacity: 0.5;
    }

    .preview-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .preview-img.active {
      display: block;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      border: none;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-camera {
      background: var(--scan);
      color: white;
    }

    .btn-camera:hover:not(:disabled) {
      background: #22d3ee;
      transform: translateY(-1px);
    }

    .btn-capture {
      background: var(--accent);
      color: white;
    }

    .btn-capture:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-upload {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .btn-upload:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-copy {
      background: var(--success);
      color: white;
    }

    .btn-copy:hover {
      background: #16a34a;
      transform: translateY(-1px);
    }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .btn-clear:hover {
      border-color: #ef4444;
      color: #f87171;
    }

    .btn-download {
      background: var(--accent);
      color: white;
    }

    .btn-download:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .text-output {
      width: 100%;
      min-height: 180px;
      padding: 1.25rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-dark);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    .text-output:focus {
      border-color: var(--accent);
    }

    .text-output::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    .actions-text {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .lang-select label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .lang-select select {
      width: 100%;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-dark);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
    }

    .warning {
      background: rgba(245, 158, 11, 0.15);
      border: 1px solid rgba(245, 158, 11, 0.4);
      border-radius: 10px;
      padding: 1rem;
      font-size: 0.9rem;
      color: #fbbf24;
      margin-bottom: 1.5rem;
    }

    #fileInput {
      display: none;
    }

    .status {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .status.processing {
      color: var(--scan);
    }

    .status.error {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Scanner de Documento</h1>
      <p class="subtitle">Use a câmera ou envie uma imagem para extrair texto (OCR)</p>
    </header>

    <div class="warning" id="browserWarning" style="display: none;">
      A câmera e o OCR funcionam melhor no <strong>Chrome</strong> ou <strong>Edge</strong>. 
      Use HTTPS ou localhost para acessar a câmera.
    </div>

    <div class="section">
      <div class="section-title">Idioma do documento</div>
      <div class="lang-select">
        <label for="lang">Reconhecer texto em:</label>
        <select id="lang">
          <option value="por">Português</option>
          <option value="eng">Inglês</option>
          <option value="spa">Espanhol</option>
          <option value="fra">Francês</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Câmera / Imagem</div>
      <div class="camera-area">
        <video id="video" autoplay playsinline muted></video>
        <img id="previewImg" class="preview-img" alt="Preview">
        <div class="camera-placeholder" id="placeholder">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 13v7a2 2 0 01-2 2H7a2 2 0 01-2-2v-7" />
          </svg>
          <span>Inicie a câmera ou envie uma imagem</span>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-camera" id="cameraBtn">📷 Iniciar câmera</button>
        <button class="btn btn-capture" id="captureBtn" disabled>📸 Capturar e extrair texto</button>
        <button class="btn btn-upload" id="uploadBtn">📁 Enviar imagem</button>
      </div>
      <input type="file" id="fileInput" accept="image/*">
      <div class="status" id="status"></div>
    </div>

    <div class="section">
      <div class="section-title">Texto extraído</div>
      <textarea class="text-output" id="textOutput" placeholder="O texto extraído aparecerá aqui..."></textarea>
      <div class="actions-text">
        <button class="btn btn-copy" id="copyBtn" disabled>📋 Copiar</button>
        <button class="btn btn-download" id="downloadBtn" disabled>💾 Baixar .txt</button>
        <button class="btn btn-clear" id="clearBtn">🗑️ Limpar</button>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const previewImg = document.getElementById('previewImg');
    const placeholder = document.getElementById('placeholder');
    const cameraBtn = document.getElementById('cameraBtn');
    const captureBtn = document.getElementById('captureBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const textOutput = document.getElementById('textOutput');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const langSelect = document.getElementById('lang');
    const statusEl = document.getElementById('status');
    const browserWarning = document.getElementById('browserWarning');

    let stream = null;
    let isCameraActive = false;

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        video.classList.add('active');
        previewImg.classList.remove('active');
        placeholder.classList.add('hidden');
        cameraBtn.textContent = '⏹️ Parar câmera';
        captureBtn.disabled = false;
        isCameraActive = true;
        statusEl.textContent = '';
        statusEl.className = 'status';
      } catch (err) {
        statusEl.textContent = 'Erro ao acessar câmera: ' + (err.message || 'Permissão negada');
        statusEl.className = 'status error';
        browserWarning.style.display = 'block';
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      video.srcObject = null;
      video.classList.remove('active');
      placeholder.classList.remove('hidden');
      cameraBtn.textContent = '📷 Iniciar câmera';
      captureBtn.disabled = true;
      isCameraActive = false;
    }

    cameraBtn.addEventListener('click', () => {
      if (isCameraActive) stopCamera();
      else startCamera();
    });

    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      fileInput.value = '';
      const reader = new FileReader();
      reader.onload = async (ev) => {
        previewImg.src = ev.target.result;
        previewImg.classList.add('active');
        video.classList.remove('active');
        placeholder.classList.add('hidden');
        cameraBtn.textContent = '📷 Iniciar câmera';
        captureBtn.disabled = true;
        isCameraActive = false;
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
          stream = null;
        }
        await runOCR(ev.target.result);
      };
      reader.readAsDataURL(file);
    });

    captureBtn.addEventListener('click', async () => {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const dataUrl = canvas.toDataURL('image/png');
      previewImg.src = dataUrl;
      previewImg.classList.add('active');
      video.classList.remove('active');
      await runOCR(dataUrl);
    });

    async function runOCR(imageSrc) {
      statusEl.textContent = 'Extraindo texto...';
      statusEl.className = 'status processing';
      captureBtn.disabled = true;
      captureBtn.innerHTML = '<span class="loading"></span> Processando...';

      try {
        const { data: { text } } = await Tesseract.recognize(imageSrc, langSelect.value, {
          logger: m => {
            if (m.status === 'recognizing text') {
              statusEl.textContent = 'Reconhecendo... ' + (m.progress ? Math.round(m.progress * 100) + '%' : '');
            }
          }
        });
        textOutput.value = text.trim() || '(Nenhum texto encontrado)';
        updateButtons();
        statusEl.textContent = 'Texto extraído com sucesso!';
        statusEl.className = 'status';
      } catch (err) {
        statusEl.textContent = 'Erro ao extrair texto: ' + (err.message || 'Tente novamente');
        statusEl.className = 'status error';
      } finally {
        captureBtn.disabled = false;
        captureBtn.innerHTML = '📸 Capturar e extrair texto';
      }
    }

    function updateButtons() {
      const hasText = textOutput.value.trim().length > 0 && textOutput.value !== '(Nenhum texto encontrado)';
      copyBtn.disabled = !hasText;
      downloadBtn.disabled = !hasText;
    }

    copyBtn.addEventListener('click', () => {
      textOutput.select();
      navigator.clipboard.writeText(textOutput.value);
      copyBtn.textContent = '✓ Copiado!';
      setTimeout(() => { copyBtn.innerHTML = '📋 Copiar'; }, 2000);
    });

    downloadBtn.addEventListener('click', () => {
      const blob = new Blob([textOutput.value], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'documento-' + new Date().toISOString().slice(0, 10) + '.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    clearBtn.addEventListener('click', () => {
      textOutput.value = '';
      previewImg.src = '';
      previewImg.classList.remove('active');
      placeholder.classList.remove('hidden');
      cameraBtn.textContent = '📷 Iniciar câmera';
      captureBtn.disabled = !isCameraActive;
      statusEl.textContent = '';
      statusEl.className = 'status';
      updateButtons();
    });

    textOutput.addEventListener('input', updateButtons);
  </script>
</body>
</html>
