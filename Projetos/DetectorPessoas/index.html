<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detector de Pessoas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181d;
      --surface-hover: #1f1f26;
      --accent: #6366f1;
      --accent-dim: #4f46e5;
      --success: #22c55e;
      --text: #e4e4e7;
      --text-muted: #a1a1aa;
      --border: #27272a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
    }

    .upload-zone {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-bottom: 1.5rem;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.08);
    }

    .upload-zone input {
      display: none;
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.7;
    }

    .upload-text {
      color: var(--text-muted);
      font-size: 1rem;
    }

    .upload-text strong {
      color: var(--accent);
    }

    .result-section {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .result-section.visible {
      display: block;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .count-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1.25rem;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
    }

    .canvas-wrap {
      position: relative;
      display: inline-block;
      max-width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .canvas-wrap canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }

    .loading.visible {
      display: block;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-new {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-new:hover {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Detector de Pessoas</h1>
      <p class="subtitle">Envie uma imagem e o sistema detecta e conta as pessoas, marcando com retângulos</p>
    </header>

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*">
      <div class="upload-icon">👤</div>
      <p class="upload-text">Arraste uma imagem aqui ou <strong>clique para selecionar</strong></p>
      <p class="upload-text" style="margin-top: 0.5rem; font-size: 0.9rem;">JPG, PNG ou WebP</p>
    </div>

    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p>Carregando modelo de IA...</p>
      <p style="font-size: 0.85rem; margin-top: 0.5rem;">Primeira execução pode demorar alguns segundos</p>
    </div>

    <div class="result-section" id="resultSection">
      <div class="result-header">
        <div class="count-badge" id="countBadge">
          <span>0</span>
          <span>pessoa(s) detectada(s)</span>
        </div>
        <button type="button" class="btn-new" id="btnNew">
          Nova imagem
        </button>
      </div>
      <div class="canvas-wrap">
        <canvas id="outputCanvas"></canvas>
      </div>
    </div>
  </div>

  <script>
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const resultSection = document.getElementById('resultSection');
    const countBadge = document.getElementById('countBadge');
    const outputCanvas = document.getElementById('outputCanvas');
    const btnNew = document.getElementById('btnNew');

    let model = null;
    let currentImage = null;

    // Carregar modelo (mobilenet_v2: mais preciso para bebês e crianças no colo)
    async function loadModel() {
      loading.classList.add('visible');
      try {
        model = await cocoSsd.load({ base: 'mobilenet_v2' });
        loading.classList.remove('visible');
      } catch (err) {
        loading.innerHTML = '<p style="color: #ef4444;">Erro ao carregar modelo. Verifique sua conexão.</p>';
      }
    }

    loadModel();

    // Calcular IoU (Intersection over Union) entre dois retângulos
    function calculateIoU(box1, box2) {
      const [x1, y1, w1, h1] = box1;
      const [x2, y2, w2, h2] = box2;
      const xi1 = Math.max(x1, x2);
      const yi1 = Math.max(y1, y2);
      const xi2 = Math.min(x1 + w1, x2 + w2);
      const yi2 = Math.min(y1 + h1, y2 + h2);
      const interArea = Math.max(0, xi2 - xi1) * Math.max(0, yi2 - yi1);
      const unionArea = w1 * h1 + w2 * h2 - interArea;
      return unionArea > 0 ? interArea / unionArea : 0;
    }

    // Remover detecções duplicadas (mesma pessoa detectada mais de uma vez)
    // IoU alto (0.65): só remove quando caixas são quase idênticas. Pessoas uma atrás da outra têm overlap menor.
    // Mantém caixas de tamanhos muito diferentes (ex: bebê no colo vs adulto)
    function nonMaxSuppression(detections, iouThreshold = 0.65) {
      const sorted = [...detections].sort((a, b) => b.score - a.score);
      const keep = [];
      for (const det of sorted) {
        let overlap = false;
        for (const kept of keep) {
          const iou = calculateIoU(det.bbox, kept.bbox);
          if (iou > iouThreshold) {
            const area1 = det.bbox[2] * det.bbox[3];
            const area2 = kept.bbox[2] * kept.bbox[3];
            const ratio = Math.min(area1, area2) / Math.max(area1, area2);
            // Se uma caixa é muito menor (ex: bebê no colo), manter ambas
            if (ratio > 0.25) overlap = true;
          }
        }
        if (!overlap) keep.push(det);
      }
      return keep;
    }

    // Detectar pessoas na imagem
    async function detectPeople(img) {
      if (!model) {
        alert('Modelo ainda carregando. Aguarde.');
        return;
      }
      // minScore 0.2: detecta bebês, crianças no colo e pessoas parcialmente visíveis
      const predictions = await model.detect(img, 30, 0.2);
      const people = predictions.filter(p => p.class === 'person');
      return nonMaxSuppression(people);
    }

    // Desenhar retângulos na imagem
    function drawDetections(img, detections) {
      const ctx = outputCanvas.getContext('2d');
      outputCanvas.width = img.width;
      outputCanvas.height = img.height;
      ctx.drawImage(img, 0, 0);

      const colors = ['#6366f1', '#22c55e', '#f59e0b', '#ec4899', '#14b8a6'];
      detections.forEach((d, i) => {
        const [x, y, w, h] = d.bbox;
        const color = colors[i % colors.length];
        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = color;
        ctx.font = 'bold 16px Outfit, sans-serif';
        ctx.fillText(`Pessoa ${i + 1} (${Math.round(d.score * 100)}%)`, x, y - 8);
      });
    }

    // Processar imagem
    async function processImage(file) {
      if (!file || !file.type.startsWith('image/')) return;

      const img = new Image();
      img.onload = async () => {
        loading.classList.add('visible');
        resultSection.classList.remove('visible');

        try {
          const people = await detectPeople(img);
          countBadge.innerHTML = `<span>${people.length}</span><span>pessoa(s) detectada(s)</span>`;
          drawDetections(img, people);
          resultSection.classList.add('visible');
        } catch (err) {
          alert('Erro na detecção: ' + err.message);
        }
        loading.classList.remove('visible');
      };
      img.src = URL.createObjectURL(file);
      currentImage = img;
    }

    // Eventos
    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => processImage(e.target.files[0]));

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      processImage(e.dataTransfer.files[0]);
    });

    btnNew.addEventListener('click', () => {
      resultSection.classList.remove('visible');
      fileInput.value = '';
    });
  </script>
</body>
</html>
