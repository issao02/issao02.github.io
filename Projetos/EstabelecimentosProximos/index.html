<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descubra Estabelecimentos Próximos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    :root {
      --bg: #0c0c0f;
      --surface: #16161a;
      --accent: #00d4aa;
      --accent-hover: #00f5c4;
      --text: #f0f0f5;
      --text-muted: #8b8b9a;
      --border: #2a2a32;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    header {
      flex-shrink: 0;
      background: linear-gradient(135deg, #0d1f1a 0%, var(--surface) 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo svg { width: 28px; height: 28px; }

    .filtros-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }

    .modo-toggle {
      display: flex;
      background: var(--surface);
      border-radius: 12px;
      padding: 4px;
      border: 1px solid var(--border);
    }

    .modo-btn {
      padding: 0.5rem 1rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .modo-btn:hover { color: var(--text); }
    .modo-btn.ativo { background: var(--accent); color: var(--bg); }

    .filtro-tipo {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      min-width: 180px;
      cursor: pointer;
    }

    .filtro-tipo:focus { outline: none; border-color: var(--accent); }

    .localizacao-busca {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .btn-local {
      padding: 0.45rem 0.9rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-local:hover {
      color: var(--text);
      border-color: var(--accent);
      background: rgba(0, 212, 170, 0.1);
    }

    .btn-local.ativo {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .main-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 2rem;
      width: 100%;
    }

    .contador {
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }

    .view-mapa {
      flex: 1;
      min-height: 200px;
      display: block;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .view-mapa.hidden { display: none; }

    #mapa-estabelecimentos {
      width: 100%;
      height: 100%;
      background: var(--surface);
    }

    .view-lista {
      display: none;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .view-lista.ativo { display: grid; }

    .card-estabelecimento {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      transition: all 0.25s;
      cursor: pointer;
    }

    .card-estabelecimento:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 212, 170, 0.12);
    }

    .card-tipo {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      background: rgba(0, 212, 170, 0.15);
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }

    .card-nome { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.35rem; }
    .card-endereco { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .card-distancia { font-size: 0.8rem; color: var(--accent); font-weight: 500; }

    .card-link {
      font-size: 0.8rem;
      color: var(--accent);
      margin-top: 0.5rem;
      display: inline-block;
    }

    .card-link:hover { color: var(--accent-hover); }

    .loading, .erro { padding: 2rem; text-align: center; color: var(--text-muted); }
    .erro { color: #f87171; }

    .load-overlay {
      position: fixed;
      inset: 0;
      background: rgba(12, 12, 15, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 9999;
      transition: opacity 0.3s;
    }

    .load-overlay.hidden {
      pointer-events: none;
      opacity: 0;
    }

    .load-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .load-overlay p {
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 500;
    }

    .leaflet-popup-content-wrapper {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .leaflet-popup-content { margin: 12px; min-width: 180px; }

    .txt-mobile { display: none; }

    @media (max-width: 768px) {
      .txt-desktop { display: none; }
      .txt-mobile { display: inline; }
      header { padding: 0.6rem 1rem; }
      .header-inner {
        flex-direction: column;
        align-items: stretch;
        gap: 0.5rem;
      }
      .logo {
        font-size: 0.95rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        justify-content: flex-start;
        line-height: 1.2;
      }
      .logo svg { width: 20px; height: 20px; flex-shrink: 0; }
      .filtros-bar {
        flex-wrap: wrap;
        gap: 0.4rem;
        align-items: center;
      }
      .modo-toggle { padding: 2px; border-radius: 8px; }
      .modo-btn {
        padding: 0.35rem 0.6rem;
        font-size: 0.75rem;
        gap: 0.3rem;
      }
      .modo-btn svg { width: 14px; height: 14px; }
      .btn-local {
        padding: 0.35rem 0.6rem;
        font-size: 0.75rem;
        gap: 0.3rem;
      }
      .btn-local svg { width: 12px; height: 12px; }
      .localizacao-busca { gap: 0.35rem; }
      .filtros-bar::after {
        content: '';
        flex-basis: 100%;
        width: 0;
        height: 0;
        order: 0;
      }
      .filtros-bar > .modo-toggle,
      .filtros-bar > .localizacao-busca { order: -1; }
      .filtros-bar > .filtro-tipo,
      .filtros-bar > #filtro-raio { order: 1; }
      .filtro-tipo {
        padding: 0.35rem 0.6rem;
        font-size: 0.8rem;
        min-width: 0;
        flex: 1;
        max-width: 45%;
      }
      #filtro-raio { max-width: 85px; }
      .main-content { padding: 1rem; }
      .view-lista {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.6rem;
      }
      .card-estabelecimento { padding: 0.75rem; }
      .card-tipo { font-size: 0.6rem; padding: 0.2rem 0.4rem; }
      .card-nome { font-size: 0.9rem; }
      .card-endereco { font-size: 0.75rem; }
      .card-distancia, .card-link { font-size: 0.7rem; }
    }

    @media (max-width: 400px) {
      .logo { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="load-overlay" id="load-overlay">
    <div class="load-spinner"></div>
    <p id="load-msg">Carregando localização...</p>
  </div>

  <header>
    <div class="header-inner">
      <h1 class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        Descubra Estabelecimentos Próximos
      </h1>
      <div class="filtros-bar">
        <div class="modo-toggle">
          <button class="modo-btn ativo" data-modo="mapa">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Mapa
          </button>
          <button class="modo-btn" data-modo="lista">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>

            <span class="txt-desktop">Centro do mapa</span><span class="txt-mobile">Centro mapa</span>
          </button>
        </div>
        <select class="filtro-tipo" id="filtro-raio" title="Raio da pesquisa em km">
          <option value="1000" selected>1 km</option>
          <option value="5000">5 km</option>

          <option value="20000">20 km</option>
        </select>
        <select class="filtro-tipo" id="filtro-tipo">
          <option value="">Todos os tipos</option>
          <option value="restaurant">Restaurante</option>
          <option value="pharmacy">Farmácia</option>
          <option value="bakery">Padaria</option>
          <option value="supermarket">Supermercado</option>
          <option value="gas_station">Posto de gasolina</option>
          <option value="hospital">Hospital</option>
          <option value="school">Escola</option>
          <option value="gym">Academia</option>
          <option value="bank">Banco</option>
          <option value="church">Igreja</option>
          <option value="shopping_mall">Shopping</option>
          <option value="doctor">Posto de saúde</option>
          <option value="pet_store">Pet shop</option>
          <option value="meal_takeaway">Lanchonete</option>
          <option value="pizza_restaurant">Pizzaria</option>
          <option value="cafe">Cafeteria</option>
          <option value="butcher_shop">Açougue</option>
          <option value="grocery_store">Mercado</option>

          <option value="barber_shop">Barbearia</option>
          <option value="beauty_salon">Salão de beleza</option>

          <option value="car_repair">Oficina mecânica</option>
        </select>
      </div>
    </div>
  </header>

  <main class="main-content">
    <p class="contador" id="contador">Carregando localização...</p>
    <div class="view-mapa" id="view-mapa">
      <div id="mapa-estabelecimentos"></div>
    </div>
    <div class="view-lista" id="view-lista"></div>
    <div id="erro-msg" class="erro" style="display: none;"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const TIPOS_LABEL = {
      restaurant: 'Restaurante', pharmacy: 'Farmácia', bakery: 'Padaria', supermarket: 'Supermercado',
      gas_station: 'Posto de gasolina', hospital: 'Hospital', school: 'Escola', gym: 'Academia',
      fitness_centre: 'Academia', fuel: 'Posto de gasolina', fast_food: 'Lanchonete', cafe: 'Cafeteria',
      clinic: 'Clínica', place_of_worship: 'Igreja', cinema: 'Cinema', hotel: 'Hotel',
      convenience: 'Mercado', butcher: 'Açougue', hairdresser: 'Barbearia', beauty: 'Salão de beleza',
      pet: 'Pet shop', mall: 'Shopping', car_repair: 'Oficina mecânica', shop: 'Loja',
      bank: 'Banco', church: 'Igreja', shopping_mall: 'Shopping', doctor: 'Posto de saúde',
      pet_store: 'Pet shop', meal_takeaway: 'Lanchonete', pizza_restaurant: 'Pizzaria', cafe: 'Cafeteria',
      butcher_shop: 'Açougue', grocery_store: 'Mercado', store: 'Loja', medical_clinic: 'Clínica',
      dentist: 'Dentista', library: 'Biblioteca', post_office: 'Correios', barber_shop: 'Barbearia',
      beauty_salon: 'Salão de beleza', hotel: 'Hotel', movie_theater: 'Cinema', car_repair: 'Oficina mecânica'
    };

    const OSM_TAGS = {
      restaurant: { amenity: 'restaurant' },
      pharmacy: { amenity: 'pharmacy' },
      bakery: { shop: 'bakery' },
      supermarket: { shop: 'supermarket' },
      gas_station: { amenity: 'fuel' },
      hospital: { amenity: 'hospital' },
      school: { amenity: 'school' },
      gym: { leisure: 'fitness_centre' },
      bank: { amenity: 'bank' },
      church: { amenity: 'place_of_worship' },
      shopping_mall: { shop: 'mall' },
      doctor: { amenity: 'clinic' },
      pet_store: { shop: 'pet' },
      meal_takeaway: { amenity: 'fast_food' },
      pizza_restaurant: { amenity: 'restaurant' },
      cafe: { amenity: 'cafe' },
      butcher_shop: { shop: 'butcher' },
      grocery_store: { shop: 'convenience' },
      store: { shop: 'shop' },
      medical_clinic: { amenity: 'clinic' },
      dentist: { amenity: 'dentist' },
      library: { amenity: 'library' },
      post_office: { amenity: 'post_office' },
      barber_shop: { shop: 'hairdresser' },
      beauty_salon: { shop: 'beauty' },
      hotel: { tourism: 'hotel' },
      movie_theater: { amenity: 'cinema' },
      car_repair: { shop: 'car_repair' }
    };

    const OVERPASS_ENDPOINTS = [
      'https://overpass.kumi.systems/api/interpreter',
      'https://overpass.private.coffee/api/interpreter',
      'https://overpass-api.de/api/interpreter'
    ];

    let mapa = null;
    let marcadores = [];
    let markerCentroBusca = null;
    let posUsuario = { lat: -23.56, lng: -46.66 };
    let estabelecimentos = [];

    function showLoad(msg) {
      const el = document.getElementById('load-overlay');
      document.getElementById('load-msg').textContent = msg || 'Carregando...';
      el.classList.remove('hidden');
    }

    function hideLoad() {
      document.getElementById('load-overlay').classList.add('hidden');
    }

    function distanciaKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng/2) * Math.sin(dLng/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function buildOverpassQuery(tipo) {
      const { lat, lng } = posUsuario;
      const raioM = parseInt(document.getElementById('filtro-raio').value) || 1000;
      const around = `around:${raioM},${lat},${lng}`;

      if (tipo && OSM_TAGS[tipo]) {
        const tags = OSM_TAGS[tipo];
        const conditions = Object.entries(tags).map(([k, v]) => `["${k}"="${v}"]`).join('');
        return `[out:json][timeout:25];
(
  node(${around})${conditions};
);
out;`;
      }

      return `[out:json][timeout:25];
(
  node(${around})["amenity"]["name"];
  node(${around})["shop"]["name"];
  node(${around})["tourism"]["name"];
);
out;`;
    }

    function osmToEstabelecimento(el) {
      let lat, lng, nome, endereco, tipoTag = '';
      if (el.type === 'node') {
        lat = el.lat;
        lng = el.lon;
      } else if (el.type === 'way' && el.center) {
        lat = el.center.lat;
        lng = el.center.lon;
      } else return null;

      nome = el.tags?.name || 'Estabelecimento';
      const addr = el.tags;
      const parts = [];
      if (addr?.['addr:street']) parts.push(addr['addr:street'] + (addr['addr:housenumber'] ? ', ' + addr['addr:housenumber'] : ''));
      if (addr?.['addr:suburb']) parts.push(addr['addr:suburb']);
      if (addr?.['addr:city']) parts.push(addr['addr:city']);
      endereco = parts.length ? parts.join(', ') : (addr?.['addr:full'] || '');

      if (el.tags?.amenity) tipoTag = el.tags.amenity;
      else if (el.tags?.shop) tipoTag = el.tags.shop;
      else if (el.tags?.tourism) tipoTag = el.tags.tourism;
      else if (el.tags?.leisure) tipoTag = el.tags.leisure;

      const osmId = el.type === 'node' ? el.id : `way/${el.id}`;
      const uri = `https://www.openstreetmap.org/${osmId}`;

      return { id: osmId, nome, endereco, tipo: tipoTag, lat, lng, uri };
    }

    async function buscarEstabelecimentos() {
      showLoad('Buscando estabelecimentos...');
      document.getElementById('erro-msg').style.display = 'none';

      const tipo = document.getElementById('filtro-tipo').value;
      const query = buildOverpassQuery(tipo);
      let data = null;
      let lastError = null;

      for (const url of OVERPASS_ENDPOINTS) {
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
              'Accept': 'application/json'
            },
            body: 'data=' + encodeURIComponent(query)
          });

          if (!res.ok) throw new Error('HTTP ' + res.status);

          const json = await res.json();
          if (json.error) throw new Error(json.error);
          if (json.remark) throw new Error(json.remark);
          data = json;
          break;
        } catch (err) {
          lastError = err;
          continue;
        }
      }

      try {
        if (!data) throw lastError || new Error('Falha ao conectar');
        const elements = data.elements || [];
        const seen = new Set();

        estabelecimentos = elements
          .map(osmToEstabelecimento)
          .filter(e => e && e.nome !== 'Estabelecimento')
          .filter(e => {
            const key = `${e.lat.toFixed(5)}_${e.lng.toFixed(5)}_${e.nome}`;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          })
          .sort((a, b) => distanciaKm(posUsuario.lat, posUsuario.lng, a.lat, a.lng) -
                     distanciaKm(posUsuario.lat, posUsuario.lng, b.lat, b.lng))
          .slice(0, 50);

        atualizarVisualizacao();
      } catch (err) {
        console.error(err);
        let msg = err?.message || 'Tente novamente ou escolha outro tipo.';
        if (msg.includes('fetch') || msg.includes('Failed') || msg.includes('Network')) {
          msg += ' (Abra o site por HTTPS, ex: GitHub Pages)';
        }
        document.getElementById('erro-msg').textContent = 'Erro ao buscar: ' + msg;
        document.getElementById('erro-msg').style.display = 'block';
        estabelecimentos = [];
        atualizarVisualizacao();
      } finally {
        hideLoad();
      }
    }

    function aplicarFiltro() {
      buscarEstabelecimentos();
    }

    function atualizarVisualizacao() {
      document.getElementById('contador').textContent =
        estabelecimentos.length + ' estabelecimento(s) encontrado(s)';

      const modoMapa = document.querySelector('.modo-btn[data-modo="mapa"]').classList.contains('ativo');

      document.getElementById('view-mapa').classList.toggle('hidden', !modoMapa);
      document.getElementById('view-lista').classList.toggle('ativo', !modoMapa);

      if (modoMapa) atualizarMapa();
      else renderizarLista();
    }

    function renderizarLista() {
      const lista = document.getElementById('view-lista');
      lista.innerHTML = estabelecimentos.map(e => {
        const dist = distanciaKm(posUsuario.lat, posUsuario.lng, e.lat, e.lng);
        const distStr = dist < 1 ? (dist * 1000).toFixed(0) + ' m' : dist.toFixed(1) + ' km';
        const tipoLabel = TIPOS_LABEL[e.tipo] || e.tipo || 'Estabelecimento';
        return `
          <div class="card-estabelecimento" onclick="centralizarNoMapa(${e.lat}, ${e.lng})">
            <span class="card-tipo">${tipoLabel}</span>
            <div class="card-nome">${e.nome}</div>
            <div class="card-endereco">${e.endereco || '—'}</div>
            <div class="card-distancia">${distStr} de distância</div>
            <a href="${e.uri}" target="_blank" rel="noopener" class="card-link">Ver no OpenStreetMap →</a>
          </div>
        `;
      }).join('');
    }

    function centralizarNoMapa(lat, lng) {
      document.querySelector('.modo-btn[data-modo="mapa"]').click();
      setTimeout(() => {
        if (mapa) mapa.setView([lat, lng], 17);
      }, 100);
    }

    function atualizarMapa() {
      if (!mapa) return;
      marcadores.forEach(m => mapa.removeLayer(m));
      marcadores = [];

      estabelecimentos.forEach(e => {
        const marker = L.marker([e.lat, e.lng]).addTo(mapa);
        const tipoLabel = TIPOS_LABEL[e.tipo] || e.tipo || 'Estabelecimento';
        const popup = `
          <div class="popup-estabelecimento">
            <div style="font-size:0.7rem;color:#00d4aa;font-weight:600;margin-bottom:4px">${tipoLabel}</div>
            <div style="font-weight:600;margin-bottom:4px">${e.nome}</div>
            <div style="font-size:0.85rem;color:#8b8b9a">${e.endereco || '—'}</div>
            <a href="${e.uri}" target="_blank" rel="noopener" style="font-size:0.8rem;color:#00d4aa;margin-top:6px;display:inline-block">Ver no OpenStreetMap →</a>
          </div>
        `;
        marker.bindPopup(popup);
        marcadores.push(marker);
      });

      if (estabelecimentos.length > 0) {
        const bounds = L.latLngBounds(estabelecimentos.map(e => [e.lat, e.lng]));
        bounds.extend([posUsuario.lat, posUsuario.lng]);
        mapa.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 });
      }
    }

    function atualizarMarkerCentro() {
      if (!mapa) return;
      if (markerCentroBusca) mapa.removeLayer(markerCentroBusca);
      markerCentroBusca = L.marker([posUsuario.lat, posUsuario.lng], {
        icon: L.divIcon({
          className: 'centro-busca-marker',
          html: '<div style="width:20px;height:20px;background:#00d4aa;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.4)"></div>',
          iconSize: [20, 20],
          iconAnchor: [10, 10]
        })
      }).addTo(mapa).bindPopup('<b>Centro da busca</b><br>Estabelecimentos próximos a este ponto');
    }

    function definirCentroELocalizar(lat, lng) {
      posUsuario = { lat, lng };
      atualizarMarkerCentro();
      if (mapa) mapa.setView([lat, lng], mapa.getZoom());
      buscarEstabelecimentos();
    }

    function initMapa() {
      showLoad('Carregando mapa...');
      mapa = L.map('mapa-estabelecimentos').setView([posUsuario.lat, posUsuario.lng], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }).addTo(mapa);

      mapa.on('click', (e) => {
        definirCentroELocalizar(e.latlng.lat, e.latlng.lng);
      });

      atualizarMarkerCentro();
      buscarEstabelecimentos();
    }

    function initApp() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => {
            posUsuario = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            initMapa();
          },
          () => initMapa()
        );
      } else {
        initMapa();
      }
    }

    document.querySelectorAll('.modo-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
        atualizarVisualizacao();
      });
    });

    document.getElementById('filtro-tipo').addEventListener('change', aplicarFiltro);
    document.getElementById('filtro-raio').addEventListener('change', aplicarFiltro);

    document.getElementById('btn-minha-local').addEventListener('click', () => {
      if (!navigator.geolocation) {
        alert('Geolocalização não disponível.');
        return;
      }
      showLoad('Obtendo localização...');
      navigator.geolocation.getCurrentPosition(
        pos => definirCentroELocalizar(pos.coords.latitude, pos.coords.longitude),
        () => {
          hideLoad();
          document.getElementById('contador').textContent = 'Não foi possível obter a localização.';
        }
      );
    });

    document.getElementById('btn-centro-mapa').addEventListener('click', () => {
      if (!mapa) return;
      const center = mapa.getCenter();
      definirCentroELocalizar(center.lat, center.lng);
    });

    initApp();
  </script>
</body>
</html>
