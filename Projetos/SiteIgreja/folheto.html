<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folheto | Paróquia São José</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background: #252525;
      border-bottom: 1px solid #333;
    }
    .topbar a {
      color: #b8860b;
      text-decoration: none;
      font-weight: 500;
    }
    .topbar a:hover { text-decoration: underline; }
    .viewer {
      flex: 1;
      width: 100vw;
      max-width: 100%;
      display: block;
      padding: 0;
      overflow: hidden;
      position: relative;
    }
    .viewer #conteudo,
    .viewer .pdf-wrapper {
      width: 100%;
      height: calc(100vh - 56px);
      min-height: 400px;
    }
    .viewer object,
    .viewer embed,
    .viewer iframe {
      display: block;
      width: 100% !important;
      max-width: 100vw;
      height: calc(100vh - 56px) !important;
      min-height: 400px;
      border: none;
    }
    .erro {
      text-align: center;
      padding: 3rem 2rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html#folheto">← Voltar aos folhetos</a>
    <span id="titulo-folheto"></span>
    <a href="#" id="abrir-nova-aba" target="_blank" style="display:none">Abrir em nova aba</a>
  </div>
  <div class="viewer">
    <div id="conteudo"></div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const arquivo = params.get('pdf');
      const tituloEl = document.getElementById('titulo-folheto');
      const conteudoEl = document.getElementById('conteudo');
      const url = 'folhetos/' + (arquivo || '');

      if (!arquivo || /[^a-zA-Z0-9._\-\s]/i.test(arquivo)) {
        tituloEl.textContent = '';
        conteudoEl.innerHTML = '<div class="erro">Folheto não especificado ou inválido.</div>';
        return;
      }

      tituloEl.textContent = arquivo.replace(/\.pdf$/i, '');
      const pdfUrl = url + '#toolbar=1&navpanes=1&scrollbar=1&view=FitH';
      const abrirLink = document.getElementById('abrir-nova-aba');
      if (abrirLink) {
        abrirLink.href = url;
        abrirLink.style.display = 'inline';
      }
      conteudoEl.innerHTML = '<div class="pdf-wrapper">' +
        '<object data="' + pdfUrl + '" type="application/pdf" width="100%" height="100%">' +
        '<p>Não foi possível carregar o PDF. <a href="' + url + '" target="_blank">Abrir PDF em nova aba</a></p>' +
        '</object></div>';
    })();
  </script>
</body>
</html>
